<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Components" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  * { box-sizing: border-box; }
  .stage { width: 700px; padding: 28px 32px; display:flex; flex-direction:column; gap:16px; }
  .field { display:flex; flex-direction:column; gap:6px; min-width: 0; }
  .label { font-family: Manrope, sans-serif; font-weight:600; font-size:13px; color:#463528; }
  .input, .select, .textarea {
    font-family: Manrope, sans-serif; font-size:14px; color:#2A1F18;
    background:#FFFFFF; border:1px solid #D9CAAE; border-radius:8px;
    padding:10px 12px; width: 100%; min-width: 0;
  }
  .input::placeholder { color:#B0A08D; }
  .input.focus { border-color:#C8553D; box-shadow: 0 0 0 3px rgba(200,85,61,0.25); outline: 0; }
  .select {
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%237B6655' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 34px;
    text-transform: capitalize;
    cursor: pointer;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .help { font-family: Manrope, sans-serif; font-size: 12px; color: #7B6655; }
  .search-wrap { position: relative; }
  .search-wrap::before {
    content:""; position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width: 14px; height: 14px; border:1.5px solid #7B6655; border-radius:999px;
  }
  .search-wrap::after {
    content:""; position:absolute; left:23px; top:calc(50% + 5px);
    width:6px; height: 1.5px; background:#7B6655; transform: rotate(45deg);
    transform-origin:left center;
  }
  .search { padding-left: 36px; }
</style>
</head><body>
<div class="stage">
  <div class="field">
    <label class="label">Title</label>
    <input class="input focus" value="Buttermilk pancakes"/>
    <span class="help">Focused — tomato halo</span>
  </div>
  <div class="row">
    <div class="field">
      <label class="label">Chapter</label>
      <select class="input select">
        <option>appetizer</option>
        <option>soup</option>
        <option>salad</option>
        <option>side</option>
        <option selected>entrée</option>
        <option>sauce</option>
        <option>dessert</option>
      </select>
    </div>
    <div class="field">
      <label class="label">Tags</label>
      <input class="input" placeholder="vegetarian, gluten-free"/>
    </div>
  </div>
  <div class="field">
    <label class="label">Search</label>
    <div class="search-wrap"><input class="input search" placeholder="Search by title or ingredient…"/></div>
  </div>
</div>
</body></html>
