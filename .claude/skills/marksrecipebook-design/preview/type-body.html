<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Type" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  .stage { width: 700px; padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #EADFC9; }
  .row:last-child { border:0; margin:0; padding:0; }
  .tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: #7B6655;
    margin-left: auto;
    white-space: nowrap;
  }
</style>
</head><body>
<div class="stage">
  <div class="row">
    <span style="font-family:Manrope,sans-serif;font-weight:600;font-size:18px;color:#2A1F18">Heat the oven to 200°C</span>
    <span class="tag">Manrope 600 · 18px</span>
  </div>
  <div class="row">
    <span style="font-family:Manrope,sans-serif;font-weight:400;font-size:16px;color:#463528;line-height:1.5">Whisk the eggs and milk together, then fold in the flour mixture until just combined.</span>
    <span class="tag">Manrope 400 · 16px</span>
  </div>
  <div class="row">
    <span style="font-family:Manrope,sans-serif;font-weight:400;font-size:14px;color:#463528">A small portion of caption-style copy at 14px, used in form helpers and metadata.</span>
    <span class="tag">Manrope 400 · 14px</span>
  </div>
  <div class="row">
    <span style="font-family:Manrope,sans-serif;font-weight:600;font-size:11px;color:#7B6655;text-transform:uppercase;letter-spacing:0.12em">Ingredients · 8 items</span>
    <span class="tag">Manrope 600 caps · 11px</span>
  </div>
</div>
</body></html>
