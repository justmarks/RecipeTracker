<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Type" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  .stage { width: 700px; padding: 28px 32px; }
  .mono { font-family: "JetBrains Mono", monospace; font-feature-settings: "tnum"; color: #2A1F18; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #EADFC9; font-size: 13px; }
  th { font-family: Manrope, sans-serif; font-weight:600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #7B6655; }
  td:first-child { font-family: Manrope, sans-serif; color: #463528; }
  .tag { font-family: "JetBrains Mono", monospace; font-size: 10px; color: #7B6655; margin-top: 14px; }
</style>
</head><body>
<div class="stage">
  <table>
    <thead><tr><th>Field</th><th>Value</th></tr></thead>
    <tbody>
      <tr><td>Yield</td><td class="mono">4 servings</td></tr>
      <tr><td>Prep</td><td class="mono">20 min</td></tr>
      <tr><td>Cook</td><td class="mono">8–10 min</td></tr>
      <tr><td>Total</td><td class="mono">45 min</td></tr>
      <tr><td>Measure</td><td class="mono">1½ cups flour</td></tr>
    </tbody>
  </table>
  <div class="tag">JetBrains Mono 400 · tabular numbers · used only for times, yields, measures</div>
</div>
</body></html>
