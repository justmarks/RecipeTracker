<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Components" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  * { box-sizing: border-box; }
  .stage { width: 700px; padding: 28px 32px; display:flex; flex-direction:column; gap:20px; }
  .label { font-family: Manrope, sans-serif; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:#7B6655; margin-bottom:10px; }
  .pair { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .dz {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; padding:24px; border-radius:8px; min-height:120px;
    font-family: Manrope, sans-serif; font-size:13px; text-align:center;
  }
  .dz.idle { border:1.5px dashed #D9CAAE; background:#FDFAF4; color:#7B6655; }
  .dz.hover { border:1.5px dashed #C8553D; background:#FBEDE8; color:#903525; }
  .cap { font-family:"JetBrains Mono", monospace; font-size:10px; color:#B0A08D; margin-top:6px; text-align:center; }
  .frames { display:flex; gap:16px; align-items:flex-end; }
  .frame { background:#F4ECDD; border:1px solid #EADFC9; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:#B0A08D; }
  .frame.lg { width:150px; height:112px; }
  .frame.sm { width:64px; height:64px; border-radius:10px; }
  .frame .ital { font-family:Newsreader, serif; font-style:italic; font-size:13px; }
</style>
</head><body>
<div class="stage">
  <div>
    <div class="label">Photo-import drop-zone — states</div>
    <div class="pair">
      <div>
        <div class="dz idle">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 17 L9 12 L13 15 L17 11 L21 15"/></svg>
          Drag a photo here, or click to choose
        </div>
        <div class="cap">idle · paper-50 + border-strong dash</div>
      </div>
      <div>
        <div class="dz hover">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 17 L9 12 L13 15 L17 11 L21 15"/></svg>
          Drop to read the recipe
        </div>
        <div class="cap">drag-hover · tomato-50 + tomato-500 dash</div>
      </div>
    </div>
  </div>

  <div>
    <div class="label">PhotoFrame empty state — caption vs no-caption</div>
    <div class="frames">
      <div>
        <div class="frame lg">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="6" width="24" height="20" rx="2"/><circle cx="12" cy="13" r="2"/><path d="M4 22 L11 16 L17 21 L22 17 L28 22"/></svg>
          <span class="ital">No photo yet</span>
        </div>
        <div class="cap">cards · showCaption</div>
      </div>
      <div>
        <div class="frame sm">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="6" width="24" height="20" rx="2"/><circle cx="12" cy="13" r="2"/><path d="M4 22 L11 16 L17 21 L22 17 L28 22"/></svg>
        </div>
        <div class="cap">≤64px thumb · showCaption={false}</div>
      </div>
    </div>
  </div>
</div>
</body></html>
