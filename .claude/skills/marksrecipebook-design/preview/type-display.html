<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Type" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  .stage { width: 700px; padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .specimen { color: #2A1F18; }
  .tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: #7B6655;
    margin-left: auto;
    white-space: nowrap;
  }
  .row { border-bottom: 1px solid #EADFC9; padding-bottom: 12px; }
  .row:last-child { border: 0; padding-bottom: 0; }
</style>
</head><body>
<div class="stage">
  <div class="row">
    <span class="specimen" style="font-family:Newsreader,serif;font-weight:500;font-size:48px;line-height:1;letter-spacing:-0.02em">Roast chicken</span>
    <span class="tag">Newsreader 500 · 48px</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-family:Newsreader,serif;font-weight:500;font-size:38px;line-height:1.1;letter-spacing:-0.015em">Sunday pancakes</span>
    <span class="tag">Newsreader 500 · 38px</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-family:Newsreader,serif;font-weight:500;font-size:30px;line-height:1.2">Chapter — Dessert</span>
    <span class="tag">Newsreader 500 · 30px</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-family:Newsreader,serif;font-style:italic;font-weight:400;font-size:24px;color:#C8553D">Recipe Book</span>
    <span class="tag">Newsreader italic · 24px</span>
  </div>
</div>
</body></html>
