<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Spacing" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  .stage { width: 700px; padding: 28px 32px; display:flex; gap:20px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width: 100px; height: 80px; background: #C8553D; }
  .name { font-family: Manrope, sans-serif; font-weight: 600; font-size: 12px; color: #463528; }
  .val { font-family: "JetBrains Mono", monospace; font-size: 10px; color: #7B6655; }
</style>
</head><body>
<div class="stage">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">sm</div><div class="val">4px · tags</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="name">lg</div><div class="val">14px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">xl</div><div class="val">20px · modal</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">pill</div><div class="val">avatar</div></div>
</div>
</body></html>
