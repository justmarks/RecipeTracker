<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Components" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  .stage { width: 700px; padding: 28px 32px; }
  .section-title { font-family: Newsreader, serif; font-weight:500; font-size:20px; color:#2A1F18; display:flex; align-items:baseline; gap:8px; padding-bottom: 6px; border-bottom: 1px solid #EADFC9; }
  .section-title .count { font-family: "JetBrains Mono", monospace; font-size:11px; color:#B0A08D; }
  .list { list-style:none; padding:0; margin: 0; }
  .item { display:flex; justify-content:space-between; align-items:center; padding: 14px 0; border-bottom: 1px solid #EADFC9; }
  .item:last-child { border-bottom: 0; }
  .item .name { font-family: Manrope, sans-serif; font-weight:500; font-size:15px; color:#2A1F18; }
  .item .tags { font-family:"JetBrains Mono", monospace; font-size:11px; color:#7B6655; margin-top:3px; }
  .item .chev { color:#B0A08D; font-family:Newsreader, serif; font-size:18px; }
  .hover { background: #F4ECDD; margin: 0 -12px; padding: 14px 12px; border-radius: 8px; border-bottom-color: transparent; }
</style>
</head><body>
<div class="stage">
  <div class="section-title"><span>Entrée</span><span class="count">3</span></div>
  <ul class="list">
    <li class="item">
      <div>
        <div class="name">Buttermilk pancakes</div>
        <div class="tags">vegetarian</div>
      </div>
      <span class="chev">›</span>
    </li>
    <li class="item hover">
      <div>
        <div class="name">Roast chicken with lemon and thyme</div>
        <div class="tags">sunday, comfort</div>
      </div>
      <span class="chev">›</span>
    </li>
    <li class="item">
      <div>
        <div class="name">Mom's lasagna</div>
        <div class="tags">family, weekday</div>
      </div>
      <span class="chev">›</span>
    </li>
  </ul>
</div>
</body></html>
