<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Spacing" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  .stage { width: 700px; padding: 28px 32px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row:last-child { margin: 0; }
  .bar { background:#C8553D; height: 12px; border-radius: 3px; }
  .lbl { font-family: "JetBrains Mono", monospace; font-size: 11px; color:#7B6655; width: 96px; }
  .val { font-family: "JetBrains Mono", monospace; font-size: 11px; color:#463528; }
</style>
</head><body>
<div class="stage">
  <div class="row"><span class="lbl">--space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="lbl">--space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="lbl">--space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="lbl">--space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="lbl">--space-6</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="lbl">--space-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="lbl">--space-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="lbl">--space-16</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
  <div class="row"><span class="lbl">--space-20</span><div class="bar" style="width:80px"></div><span class="val">80px</span></div>
</div>
</body></html>
