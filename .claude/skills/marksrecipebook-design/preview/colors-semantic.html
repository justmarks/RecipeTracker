<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Colors" -->
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .stage { width: 700px; padding: 24px 32px; background: #FBF6EE; }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .pill {
    padding: 10px 14px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; font-weight: 500;
  }
  .grp-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #7B6655; margin-bottom: 8px; }
  .group { margin-bottom: 14px; }
  .group:last-child { margin: 0; }
  .tag { font-family: "JetBrains Mono", monospace; font-size: 10px; opacity: 0.75; }
</style>
</head><body>
<div class="stage">
  <div class="group">
    <div class="grp-label">Semantic — backgrounds + foregrounds</div>
    <div class="row">
      <div class="pill" style="background:#E1E5D0;color:#5A6A3F"><span>Success — saved</span><span class="tag">olive-100 / 700</span></div>
      <div class="pill" style="background:#FBEED0;color:#A87A22"><span>Warning — review</span><span class="tag">saffron-100 / 700</span></div>
      <div class="pill" style="background:#FBEDE8;color:#903525"><span>Danger — delete?</span><span class="tag">tomato-50 / 700</span></div>
      <div class="pill" style="background:#E5E9DC;color:#5A6A3F"><span>Info — note</span><span class="tag">info / olive-700</span></div>
    </div>
  </div>
  <div class="group">
    <div class="grp-label">Surfaces</div>
    <div class="row">
      <div class="pill" style="background:#FBF6EE;color:#463528;border:1px dashed #EADFC9"><span>bg-page</span><span class="tag">#FBF6EE</span></div>
      <div class="pill" style="background:#FFFFFF;color:#463528;box-shadow:0 1px 2px rgba(70,53,40,.08)"><span>bg-card</span><span class="tag">#FFFFFF</span></div>
      <div class="pill" style="background:#F4ECDD;color:#463528"><span>bg-sunken</span><span class="tag">#F4ECDD</span></div>
      <div class="pill" style="background:#FDFAF4;color:#463528;border:1px solid #EADFC9"><span>bg-elevated</span><span class="tag">#FDFAF4</span></div>
    </div>
  </div>
</div>
</body></html>
