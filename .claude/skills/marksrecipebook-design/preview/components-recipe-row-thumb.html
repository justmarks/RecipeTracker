<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Components" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  * { box-sizing: border-box; }
  .stage { width: 700px; padding: 24px 32px; display: flex; flex-direction: column; }
  .row {
    display: flex; gap: 14px; align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #EADFC9;
  }
  .row:last-child { border-bottom: 0; }
  .thumb {
    flex: 0 0 64px;
    width: 64px; height: 64px;
    border-radius: 10px;
    overflow: hidden; background: #F4ECDD;
    border: 1px solid #EADFC9;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.empty {
    display: flex; align-items: center; justify-content: center;
    color: #B0A08D;
  }
  .body { flex: 1; min-width: 0; }
  .title {
    font-family: Newsreader, serif; font-weight: 500; font-size: 18px;
    color: #2A1F18; line-height: 1.2; letter-spacing: -0.005em;
  }
  .meta-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
  .meta { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #7B6655; }
  .dot { color: #D9CAAE; font-size: 11px; }
  .tag { font-family: Manrope, sans-serif; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
  .tag.veg { background:#E1E5D0; color:#5A6A3F; }
  .tag.gf  { background:#FBEED0; color:#A87A22; }
  .chev { color: #B0A08D; font-family: Newsreader, serif; font-size: 18px; flex: 0 0 18px; }
</style>
</head><body>
<div class="stage">
  <div class="row">
    <div class="thumb">
      <img src="https://images.unsplash.com/photo-1528207776546-365bb710ee93?w=200&h=200&fit=crop&q=80" alt="">
    </div>
    <div class="body">
      <div class="title">Buttermilk pancakes</div>
      <div class="meta-row">
        <span class="meta">28 min</span>
        <span class="dot">·</span>
        <span class="tag veg">vegetarian</span>
      </div>
    </div>
    <span class="chev">›</span>
  </div>

  <div class="row">
    <div class="thumb">
      <img src="https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=200&h=200&fit=crop&q=80" alt="">
    </div>
    <div class="body">
      <div class="title">Roast chicken with lemon and thyme</div>
      <div class="meta-row">
        <span class="meta">1 hr 15 min</span>
        <span class="dot">·</span>
        <span class="tag">sunday</span>
      </div>
    </div>
    <span class="chev">›</span>
  </div>

  <div class="row">
    <div class="thumb empty">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" stroke="#B0A08D" stroke-width="1.5">
        <rect x="4" y="6" width="24" height="20" rx="2"/>
        <circle cx="12" cy="13" r="2"/>
        <path d="M4 22 L11 16 L17 21 L22 17 L28 22"/>
      </svg>
    </div>
    <div class="body">
      <div class="title">Mom's lasagna</div>
      <div class="meta-row">
        <span class="meta">2 hr</span>
        <span class="dot">·</span>
        <span class="tag">family</span>
      </div>
    </div>
    <span class="chev">›</span>
  </div>
</div>
</body></html>
