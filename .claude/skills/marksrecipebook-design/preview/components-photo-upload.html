<!doctype html>
<html><head><meta charset="utf-8">
<!-- @dsCard group="Components" -->
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background:#FBF6EE; margin:0; }
  * { box-sizing: border-box; }
  .stage { width: 700px; padding: 28px 32px; display:flex; flex-direction:column; gap:22px; }
  .lbl { font-family: Manrope, sans-serif; font-weight:600; font-size:13px; color:#463528; display:block; margin-bottom:6px; }
  .hint { font-family: Manrope, sans-serif; font-size:12px; color:#7B6655; margin-top:6px; }
  .input { font-family: Manrope, sans-serif; font-size:14px; color:#B0A08D; background:#fff; border:1px solid #D9CAAE; border-radius:8px; padding:10px 12px; width:100%; }
  .filerow { display:flex; gap:8px; align-items:flex-start; }
  .choose { font-family: Manrope, sans-serif; font-weight:600; font-size:14px; color:#463528; background:transparent; border:1px solid #D9CAAE; border-radius:8px; padding:10px 16px; display:inline-flex; align-items:center; gap:8px; cursor:pointer; white-space:nowrap; }
  .thumbrow { display:flex; align-items:center; gap:10px; margin-top:10px; }
  .thumb { width:56px; height:56px; border-radius:4px; overflow:hidden; border:1px solid #EADFC9; flex:0 0 56px; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .remove { font-family: Manrope, sans-serif; font-size:12px; color:#903525; background:transparent; border:0; cursor:pointer; }
  .empty { width:56px; height:56px; border-radius:4px; background:#F4ECDD; display:flex; align-items:center; justify-content:center; color:#B0A08D; border:1px solid #EADFC9; }
</style>
</head><body>
<div class="stage">
  <div>
    <label class="lbl">Photo — empty</label>
    <div class="filerow">
      <input class="input" placeholder="https://… or upload →">
      <button class="choose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="15"/><polyline points="7 8 12 3 17 8"/><path d="M3 17 v3 a1 1 0 0 0 1 1 h16 a1 1 0 0 0 1-1 v-3"/></svg>Choose file</button>
    </div>
    <div class="hint">Paste an image URL, or upload a photo of the dish. Uploads go to Storage; the returned URL is stored.</div>
  </div>

  <div>
    <label class="lbl">Photo — set (1:1 thumbnail, radius-sm)</label>
    <div class="filerow">
      <input class="input" style="color:#463528" value="recipes/r1/photo.jpg">
      <button class="choose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="15"/><polyline points="7 8 12 3 17 8"/><path d="M3 17 v3 a1 1 0 0 0 1 1 h16 a1 1 0 0 0 1-1 v-3"/></svg>Choose file</button>
    </div>
    <div class="thumbrow">
      <div class="thumb"><img src="https://images.unsplash.com/photo-1528207776546-365bb710ee93?w=120&h=120&fit=crop&q=80" alt=""></div>
      <button class="remove">Remove photo</button>
    </div>
  </div>

  <div>
    <label class="lbl">Photo placeholder — missing (paper-200 + camera glyph)</label>
    <div class="thumbrow">
      <div class="empty">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="6" width="24" height="20" rx="2"/><circle cx="12" cy="13" r="2"/><path d="M4 22 L11 16 L17 21 L22 17 L28 22"/></svg>
      </div>
      <span style="font-family:Newsreader,serif;font-style:italic;font-size:14px;color:#B0A08D">No photo yet</span>
    </div>
  </div>
</div>
</body></html>
