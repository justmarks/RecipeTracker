name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-firebase-production
  cancel-in-progress: false

# Opt every action into the Node 24 runtime ahead of the June 2 2026
# cutover when GitHub forces the switch. The actions we use (checkout,
# setup-node, pnpm/action-setup, google-github-actions/auth) all bundle
# their own JS — this flag tells the runner to execute that JS under
# Node 24 instead of the deprecated Node 20. Unrelated to the
# node-version we pass to setup-node, which controls the build's Node.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Fail fast with a clear message if any required secret is empty.
      # Without this, the google-github-actions/auth step further down
      # errors with "must specify exactly one of workload_identity_provider
      # or credentials_json" — accurate but easy to misread as a workflow
      # syntax problem when it's really a missing-secret problem.
      - name: Verify required secrets
        # The VITE_FIREBASE_* values fall back to `vars.*` so they can
        # live in either the Secrets tab OR the Variables tab — Firebase's
        # web SDK API key is intentionally public, so either is correct.
        # The service-account JSON must be a real secret.
        env:
          FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
        run: |
          # All VITE_* values get inlined into the JS bundle at build
          # time. An empty value here means the deployed app will throw
          # "Firebase: Error (auth/invalid-api-key)" on first load —
          # silently broken from the user's perspective until you open
          # devtools. Fail the build instead.
          missing=()
          [ -z "$FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK" ] && missing+=("FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK")
          [ -z "$VITE_FIREBASE_API_KEY" ] && missing+=("VITE_FIREBASE_API_KEY")
          [ -z "$VITE_FIREBASE_AUTH_DOMAIN" ] && missing+=("VITE_FIREBASE_AUTH_DOMAIN")
          [ -z "$VITE_FIREBASE_PROJECT_ID" ] && missing+=("VITE_FIREBASE_PROJECT_ID")
          [ -z "$VITE_FIREBASE_STORAGE_BUCKET" ] && missing+=("VITE_FIREBASE_STORAGE_BUCKET")
          [ -z "$VITE_FIREBASE_MESSAGING_SENDER_ID" ] && missing+=("VITE_FIREBASE_MESSAGING_SENDER_ID")
          [ -z "$VITE_FIREBASE_APP_ID" ] && missing+=("VITE_FIREBASE_APP_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing GitHub secrets::${missing[*]}"
            echo "::error::Set them under Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK must be the full JSON contents of a GCP service-account key."
            echo "::error::VITE_FIREBASE_* values come from Firebase Console → Project settings → Your apps → SDK setup and configuration."
            exit 1
          fi
          # Sanity check on the API key shape — Firebase web API keys
          # are 39 chars and start with "AIza". A pasted value with stray
          # quotes, spaces, or a wrong field would slip past the empty
          # check above but still break at runtime.
          if [ "${#VITE_FIREBASE_API_KEY}" -ne 39 ] || [[ "$VITE_FIREBASE_API_KEY" != AIza* ]]; then
            echo "::error title=VITE_FIREBASE_API_KEY looks wrong::Expected a 39-char string starting with 'AIza' (got ${#VITE_FIREBASE_API_KEY} chars). Re-copy from Firebase Console → Project settings → Web app SDK config and paste just the apiKey value (no quotes)."
            exit 1
          fi
          # Echo the shape of each secret so future CI failures are
          # easier to diagnose without exposing the values themselves.
          echo "All required secrets present:"
          echo "  FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK: ${#FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK} chars"
          echo "  VITE_FIREBASE_API_KEY: ${#VITE_FIREBASE_API_KEY} chars (starts with ${VITE_FIREBASE_API_KEY:0:4})"
          echo "  VITE_FIREBASE_AUTH_DOMAIN: ${#VITE_FIREBASE_AUTH_DOMAIN} chars"
          echo "  VITE_FIREBASE_PROJECT_ID: ${#VITE_FIREBASE_PROJECT_ID} chars"
          echo "  VITE_FIREBASE_STORAGE_BUCKET: ${#VITE_FIREBASE_STORAGE_BUCKET} chars"
          echo "  VITE_FIREBASE_MESSAGING_SENDER_ID: ${#VITE_FIREBASE_MESSAGING_SENDER_ID} chars"
          echo "  VITE_FIREBASE_APP_ID: ${#VITE_FIREBASE_APP_ID} chars"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # Root postinstall also installs functions/ via npm.
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        # Same secrets-OR-variables fallback as the Verify step above.
        # Vite inlines these into the bundle at build time via
        # import.meta.env.VITE_*.
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
        run: |
          # Confirm the env vars actually reached this step (separate
          # from the Verify step — those are siblings, not parent/child).
          echo "Build-step env confirmation:"
          echo "  VITE_FIREBASE_API_KEY: ${#VITE_FIREBASE_API_KEY} chars"
          echo "  VITE_FIREBASE_AUTH_DOMAIN: ${#VITE_FIREBASE_AUTH_DOMAIN} chars"
          echo "  VITE_FIREBASE_PROJECT_ID: ${#VITE_FIREBASE_PROJECT_ID} chars"
          echo "  VITE_FIREBASE_STORAGE_BUCKET: ${#VITE_FIREBASE_STORAGE_BUCKET} chars"
          echo "  VITE_FIREBASE_MESSAGING_SENDER_ID: ${#VITE_FIREBASE_MESSAGING_SENDER_ID} chars"
          echo "  VITE_FIREBASE_APP_ID: ${#VITE_FIREBASE_APP_ID} chars"
          pnpm --filter web build

      - name: Verify bundle has real Firebase config
        # Fail the deploy if Vite inlined `void 0` instead of real
        # values — much better than shipping a broken bundle and
        # finding out via "auth/invalid-api-key" in the browser.
        run: |
          bundle=$(ls web/dist/assets/index-*.js | head -1)
          echo "Inspecting: $bundle"
          if grep -q 'apiKey:void 0' "$bundle" || grep -q 'apiKey:""' "$bundle"; then
            echo "::error title=Bundle has empty apiKey::Vite inlined 'void 0' for VITE_FIREBASE_API_KEY. The env var didn't reach the Vite process even though it was set on the build step. See the Build-step env confirmation above — if API_KEY shows 39 chars there but the bundle shows void 0, this is a Vite envDir or .env-file precedence issue."
            grep -o 'apiKey:[^,}]*' "$bundle" | head -3
            exit 1
          fi
          # Print the inlined apiKey prefix as a sanity check (full
          # value is masked by GitHub's secret scrubber automatically
          # since it matches the secret).
          inlined=$(grep -o 'apiKey:"[^"]*"' "$bundle" | head -1)
          echo "Inlined: $inlined"

      - name: Build functions
        run: npm --prefix functions run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MARKSRECIPEBOOK }}

      - name: Deploy to Firebase
        # The hosting target has no predeploy hook in firebase.json — the
        # CI's earlier "Build web" step is the single source of truth for
        # web/dist/. Don't reintroduce a predeploy here or in firebase.json
        # without also passing VITE_* env vars to this step, or the
        # predeploy will rebuild the bundle without secrets and upload
        # a bundle where apiKey resolves to `void 0` at runtime.
        run: |
          npx --yes firebase-tools@latest deploy \
            --only hosting,functions,firestore,storage \
            --project marksrecipebook \
            --non-interactive \
            --force
