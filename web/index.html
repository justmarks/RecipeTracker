<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SVG favicon (modern browsers) + PNG fallbacks (older browsers, RSS readers, etc.) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C8553D" />

    <title>Marks Family Recipe Book</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <!--
      Standards-track replacement for apple-mobile-web-app-capable
      (Chrome 108+ warns about the apple- form). We keep BOTH because
      iOS Safari still only honors the apple-prefixed version — the
      standards-track one is for Chromium-based browsers and silences
      the console deprecation warning. Drop the apple- form once
      WebKit ships the unprefixed support.
    -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Recipes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
